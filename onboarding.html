<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Codex Usage Monitor</title>
  <link rel="stylesheet" href="onboarding.css"/>
</head>
<body>
  <main class="page">
    <section class="hero">
      <img class="logo" src="icons/icon128.png" alt=""/>
      <h1 data-i18n-html="onboarding_title"></h1>
      <p data-i18n="onboarding_subtitle"></p>

      <div class="features">
        <span class="pill" data-i18n="pill_session"></span>
        <span class="pill" data-i18n="pill_weekly"></span>
        <span class="pill" data-i18n="pill_auto_update"></span>
        <span class="pill" data-i18n="pill_badge"></span>
        <span class="pill" data-i18n="pill_free"></span>
      </div>
    </section>

    <section class="steps">
      <p class="steps-title" data-i18n="onboarding_steps_title"></p>

      <article class="step">
        <div class="step-num">1</div>
        <div class="step-body">
          <h2 data-i18n="onboarding_step1_title"></h2>
          <p data-i18n="onboarding_step1_desc"></p>
        </div>
      </article>

      <article class="step">
        <div class="step-num">2</div>
        <div class="step-body">
          <h2 data-i18n="onboarding_step2_title"></h2>
          <p data-i18n="onboarding_step2_desc"></p>
        </div>
      </article>

      <article class="step">
        <div class="step-num">3</div>
        <div class="step-body">
          <h2 data-i18n="onboarding_step3_title"></h2>
          <p data-i18n="onboarding_step3_desc"></p>
        </div>
      </article>

      <article class="step">
        <div class="step-num">4</div>
        <div class="step-body">
          <h2 data-i18n="onboarding_step4_title"></h2>
          <p data-i18n="onboarding_step4_desc"></p>
        </div>
      </article>
    </section>

    <section class="cta">
      <a class="btn-primary" href="https://chatgpt.com/codex/cloud/settings/analytics" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span data-i18n="onboarding_cta"></span>
      </a>
    </section>

    <p class="footer" data-i18n="onboarding_footer"></p>
  </main>

  <script src="onboarding.js"></script>
</body>
</html>
